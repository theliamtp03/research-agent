name: Research Agent

on:
  schedule:
    # Runs Mon, Wed, Fri at 7:00am UK time (7:00 UTC in winter, 6:00 UTC in summer)
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research agent
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          SENDGRID_KEY: ${{ secrets.SENDGRID_KEY }}
        run: python agent.py

      - name: Commit topic rotation state
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "Research Agent"
          git add topic_rotation.json || true
          git diff --cached --quiet || git commit -m "Update topic rotation [skip ci]"
          git push || true
